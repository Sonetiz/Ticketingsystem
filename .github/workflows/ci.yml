name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ticketsystem
          POSTGRES_PASSWORD: ticketsystem
          POSTGRES_DB: ticketsystem
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticketsystem"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ticketsystem:ticketsystem@localhost:5432/ticketsystem
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-session-secret-min-32-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ticketsystem/shared build

      - name: Generate Prisma client
        run: pnpm --filter backend db:generate

      - name: Run migrations
        run: pnpm --filter backend db:migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck backend
        run: pnpm --filter backend exec tsc --noEmit

      - name: Typecheck frontend
        run: pnpm --filter frontend exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
